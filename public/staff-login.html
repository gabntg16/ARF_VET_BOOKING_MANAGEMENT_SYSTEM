<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Sign In - ARF Veterinary Clinic</title>
  <link rel="icon" type="image/png" href="assets/images/arf-logo-card-512.png"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f3ef;--panel:#fffdf9;--sage:#4a7c59;--sage-d:#35604a;
      --ink:#1e2a22;--muted:#6b7d72;--border:#dde7e0;--error:#c0392b;
    }
    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:1.5rem;
      font-family:'DM Sans',sans-serif;
      color:var(--ink);
      background:linear-gradient(135deg,#eef5ef 0%,var(--bg) 46%,#fffaf2 100%);
    }
    .shell{width:min(440px,100%)}
    .brand{display:flex;align-items:center;gap:.8rem;margin-bottom:1.3rem}
    .brand-mark{width:54px;height:54px;border-radius:14px;object-fit:cover;box-shadow:0 8px 20px rgba(30,42,34,.14);border:1px solid var(--border);background:#fff}
    .brand-name{font-family:'DM Serif Display',serif;font-size:1.35rem;line-height:1}
    .brand-sub{font-size:.68rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:.2rem}
    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow:0 18px 54px rgba(30,42,34,.14);
      padding:2rem;
    }
    h1{font-family:'DM Serif Display',serif;font-size:2rem;font-weight:400;margin-bottom:.35rem}
    .sub{color:var(--muted);font-size:.95rem;line-height:1.6;margin-bottom:1.8rem}
    label{display:block;font-size:.78rem;font-weight:700;margin-bottom:.45rem}
    input{
      width:100%;
      padding:.85rem 1rem;
      border:1.5px solid var(--border);
      border-radius:10px;
      background:#faf7f2;
      color:var(--ink);
      font:inherit;
      margin-bottom:1rem;
    }
    input:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px rgba(74,124,89,.13);background:#fff}
    button{
      width:100%;
      border:0;
      border-radius:10px;
      padding:.9rem 1rem;
      background:var(--sage);
      color:#fff;
      font:inherit;
      font-weight:700;
      cursor:pointer;
      transition:background .2s,transform .15s;
    }
    button:hover{background:var(--sage-d);transform:translateY(-1px)}
    .back{display:inline-block;margin-top:1.2rem;color:var(--sage-d);font-weight:700;text-decoration:none;font-size:.88rem}
    #alert{margin-top:1rem;padding:.75rem 1rem;border-radius:8px;font-size:.875rem;font-weight:600;display:none}
    #alert.show{display:block}
    #alert.alert-error{background:#fef2f0;color:var(--error);border:1px solid #f5c6c6}
    #alert.alert-success{background:#f0f9f4;color:var(--sage-d);border:1px solid #b7d9c8}
  </style>
</head>
<body>
  <main class="shell">
    <div class="brand">
      <img class="brand-mark" src="assets/images/arf-logo-card-512.png" alt="ARF Portal logo"/>
      <div>
        <div class="brand-name">ARF</div>
        <div class="brand-sub">Animal Relief Facility</div>
      </div>
    </div>

    <section class="card">
      <h1>Staff sign in</h1>
      <p class="sub">Access the clinic dashboard to review appointment requests, confirm schedules, and manage patient records.</p>

      <label for="unified-email">Staff ID or email</label>
      <input id="unified-email" type="text" placeholder="admin" autocomplete="username"/>

      <label for="unified-password">Password</label>
      <input id="unified-password" type="password" placeholder="Your password" autocomplete="current-password"/>

      <button onclick="unifiedLogin()">Sign In</button>
      <p id="alert" class="alert"></p>
    </section>

    <a class="back" href="index.html">Back to website</a>
  </main>

  <script src="assets/js/database.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
