<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1000" viewBox="0 0 1500 1000">
  <defs>
    <style>
      .bg{fill:#f6f3ee}.title{font:700 34px Arial,sans-serif;fill:#1f2d24}.sub{font:500 16px Arial,sans-serif;fill:#637569}
      .boundary{fill:#fff;stroke:#d8e4dc;stroke-width:3;rx:28}.actor{stroke:#2f4838;stroke-width:4;fill:none}.case{fill:#eef6f0;stroke:#3d6b4f;stroke-width:3}
      .text{font:700 17px Arial,sans-serif;fill:#1f2d24}.small{font:500 14px Arial,sans-serif;fill:#637569}.line{stroke:#2f4838;stroke-width:3}
    </style>
