<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg{fill:#f6f3ee}.title{font:700 32px Arial,sans-serif;fill:#1f2d24}.sub{font:500 15px Arial,sans-serif;fill:#637569}
      .entity{fill:#fff;stroke:#3d6b4f;stroke-width:3;rx:14}.proc{fill:#fff;stroke:#3d6b4f;stroke-width:3;rx:18}.store{fill:#fffaf1;stroke:#c8763a;stroke-width:3;rx:12}
      .text{font:700 17px Arial,sans-serif;fill:#1f2d24}.small{font:500 13px Arial,sans-serif;fill:#637569}.num{font:800 17px Arial,sans-serif;fill:#3d6b4f}
      .arrow{stroke:#2f4838;stroke-width:3;fill:none;marker-end:url(#arrow)}.flow{font:700 13px Arial,sans-serif;fill:#2f4838}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2f4838"/></marker>
  </defs>
  <rect class="bg" width="1400" height="900"/>
  <text x="700" y="58" text-anchor="middle" class="title">DFD Level 2 - Process 1.0: User Authentication</text>
  <text x="700" y="88" text-anchor="middle" class="sub">Login validation for admin/staff and client accounts</text>
  <rect x="80" y="210" width="230" height="90" class="entity"/><text x="195" y="250" text-anchor="middle" class="text">User</text><text x="195" y="275" text-anchor="middle" class="small">Client or Staff</text>
  <rect x="420" y="170" width="250" height="90" class="proc"/><text x="445" y="202" class="num">1.1</text><text x="545" y="202" text-anchor="middle" class="text">Enter Credentials</text><text x="545" y="230" text-anchor="middle" class="small">Email/Admin ID and password</text>
  <rect x="420" y="350" width="250" height="90" class="proc"/><text x="445" y="382" class="num">1.2</text><text x="545" y="382" text-anchor="middle" class="text">Validate Account</text><text x="545" y="410" text-anchor="middle" class="small">Check role and password</text>
  <rect x="760" y="350" width="250" height="90" class="proc"/><text x="785" y="382" class="num">1.3</text><text x="885" y="382" text-anchor="middle" class="text">Check Expiry</text><text x="885" y="410" text-anchor="middle" class="small">Client account status</text>
  <rect x="760" y="560" width="250" height="90" class="proc"/><text x="785" y="592" class="num">1.4</text><text x="885" y="592" text-anchor="middle" class="text">Create Session</text><text x="885" y="620" text-anchor="middle" class="small">Open dashboard</text>
  <rect x="1100" y="260" width="220" height="80" class="store"/><text x="1210" y="294" text-anchor="middle" class="text">D1 Clients</text><text x="1210" y="318" text-anchor="middle" class="small">Client accounts</text>
  <rect x="1100" y="470" width="220" height="80" class="store"/><text x="1210" y="504" text-anchor="middle" class="text">D2 Settings</text><text x="1210" y="528" text-anchor="middle" class="small">Admin password</text>
  <path d="M310 255 H420" class="arrow"/><text x="325" y="235" class="flow">Login details</text>
  <path d="M545 260 V350" class="arrow"/><path d="M670 395 H760" class="arrow"/><text x="690" y="378" class="flow">Valid user</text>
  <path d="M1010 395 C1060 380 1070 320 1100 300" class="arrow"/><path d="M1010 395 C1060 420 1070 500 1100 510" class="arrow"/>
  <path d="M885 440 V560" class="arrow"/><path d="M760 605 H310" class="arrow"/><text x="465" y="588" class="flow">Access granted / denied message</text>
</svg>
