<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs><style>.bg{fill:#f6f3ee}.title{font:700 32px Arial,sans-serif;fill:#1f2d24}.sub{font:500 15px Arial,sans-serif;fill:#637569}.entity{fill:#fff;stroke:#3d6b4f;stroke-width:3;rx:14}.proc{fill:#fff;stroke:#3d6b4f;stroke-width:3;rx:18}.store{fill:#fffaf1;stroke:#c8763a;stroke-width:3;rx:12}.text{font:700 17px Arial,sans-serif;fill:#1f2d24}.small{font:500 13px Arial,sans-serif;fill:#637569}.num{font:800 17px Arial,sans-serif;fill:#3d6b4f}.arrow{stroke:#2f4838;stroke-width:3;fill:none;marker-end:url(#arrow)}.flow{font:700 13px Arial,sans-serif;fill:#2f4838}</style><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2f4838"/></marker></defs>
  <rect class="bg" width="1400" height="900"/>
  <text x="700" y="58" text-anchor="middle" class="title">DFD Level 2 - Process 4.0: Staff Management</text>
  <text x="700" y="88" text-anchor="middle" class="sub">Veterinarian/staff profile maintenance and availability tracking</text>
  <rect x="80" y="375" width="230" height="90" class="entity"/><text x="195" y="415" text-anchor="middle" class="text">Admin / Staff</text><text x="195" y="440" text-anchor="middle" class="small">Manages team</text>
  <rect x="430" y="160" width="250" height="90" class="proc"/><text x="455" y="192" class="num">4.1</text><text x="555" y="192" text-anchor="middle" class="text">Add Staff</text><text x="555" y="220" text-anchor="middle" class="small">Name and specialization</text>
  <rect x="430" y="350" width="250" height="90" class="proc"/><text x="455" y="382" class="num">4.2</text><text x="555" y="382" text-anchor="middle" class="text">Update Availability</text><text x="555" y="410" text-anchor="middle" class="small">Available, leave, inactive</text>
  <rect x="430" y="540" width="250" height="90" class="proc"/><text x="455" y="572" class="num">4.3</text><text x="555" y="572" text-anchor="middle" class="text">Remove Staff</text><text x="555" y="600" text-anchor="middle" class="small">Delete staff record</text>
  <rect x="820" y="350" width="250" height="90" class="proc"/><text x="845" y="382" class="num">4.4</text><text x="945" y="382" text-anchor="middle" class="text">Display Staff List</text><text x="945" y="410" text-anchor="middle" class="small">Dashboard team cards</text>
  <rect x="1120" y="350" width="220" height="90" class="store"/><text x="1230" y="390" text-anchor="middle" class="text">D1 Vets</text><text x="1230" y="415" text-anchor="middle" class="small">Staff records</text>
  <path d="M310 420 H430" class="arrow"/><path d="M680 205 C760 230 780 350 820 380" class="arrow"/><path d="M680 395 H820" class="arrow"/><path d="M680 585 C760 560 780 440 820 410" class="arrow"/>
  <path d="M1070 395 H1120" class="arrow"/><path d="M1120 420 H1070" class="arrow"/><path d="M820 395 H310" class="arrow"/><text x="455" y="455" class="flow">Updated staff view</text>
</svg>
