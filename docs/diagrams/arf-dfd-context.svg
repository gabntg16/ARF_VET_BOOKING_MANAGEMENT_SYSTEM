<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg{fill:#f6f3ee}.title{font:700 34px Arial,sans-serif;fill:#1f2d24}.sub{font:500 16px Arial,sans-serif;fill:#637569}
      .entity{fill:#fff;stroke:#3d6b4f;stroke-width:3;rx:14}.process{fill:#3d6b4f;stroke:#2b4d38;stroke-width:3}
      .store{fill:#eef6f0;stroke:#c8763a;stroke-width:3;rx:10}
      .text{font:700 19px Arial,sans-serif;fill:#1f2d24}.procText{font:700 22px Arial,sans-serif;fill:#fff}.small{font:500 13px Arial,sans-serif;fill:#637569}
      .arrow{stroke:#2f4838;stroke-width:3;fill:none;marker-end:url(#arrow)}.flow{font:700 14px Arial,sans-serif;fill:#2f4838}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f4838"/>
    </marker>
  </defs>
  <rect class="bg" width="1400" height="900"/>
  <text x="700" y="58" text-anchor="middle" class="title">Data Flow Diagram - Context Level</text>
  <text x="700" y="88" text-anchor="middle" class="sub">ARF Vet Booking Management System</text>

  <rect x="90" y="245" width="270" height="110" class="entity"/>
  <text x="225" y="292" text-anchor="middle" class="text">Customer</text>
  <text x="225" y="320" text-anchor="middle" class="small">Pet owner / client</text>

  <rect x="90" y="545" width="270" height="110" class="entity"/>
  <text x="225" y="592" text-anchor="middle" class="text">Admin / Staff</text>
  <text x="225" y="620" text-anchor="middle" class="small">Clinic personnel</text>

  <circle cx="700" cy="450" r="150" class="process"/>
  <text x="700" y="424" text-anchor="middle" class="procText">ARF Vet Booking</text>
  <text x="700" y="454" text-anchor="middle" class="procText">Management System</text>
  <text x="700" y="486" text-anchor="middle" class="small" fill="#e9f4ed">Online appointment and clinic records</text>

  <rect x="1040" y="395" width="270" height="110" class="store"/>
  <text x="1175" y="442" text-anchor="middle" class="text">Arf_db</text>
  <text x="1175" y="470" text-anchor="middle" class="small">Appointments, clients, staff</text>

  <path d="M360 285 C455 260 500 290 565 350" class="arrow"/>
  <text x="445" y="262" class="flow">Appointment request</text>
  <path d="M565 550 C500 610 455 630 360 615" class="arrow"/>
  <text x="410" y="650" class="flow">Booking status / updates</text>

  <path d="M360 585 C480 520 500 495 550 470" class="arrow"/>
  <text x="430" y="535" class="flow">Login, review, status action</text>
  <path d="M558 382 C490 350 455 345 360 335" class="arrow"/>
  <text x="410" y="382" class="flow">Dashboard records</text>

  <path d="M850 450 H1040" class="arrow"/>
  <text x="910" y="430" class="flow">Create / update data</text>
  <path d="M1040 485 H850" class="arrow"/>
  <text x="902" y="520" class="flow">Stored records</text>
</svg>
